name: Submit a ranking
description: Paste your song ranking and it'll be added as a PR
title: "New ranking: [your name]"
labels: []
body:
  - type: input
    id: name
    attributes:
      label: Your name
      description: The name that will appear on the rankings page
      placeholder: "e.g. Wumbo"
    validations:
      required: true
  - type: textarea
    id: ranking
    attributes:
      label: Your ranking
      description: Paste your ranked song list, one per line. Numbered or plain — both work.
      placeholder: |
        1. A出るノート - Edel Note
        2. Dream Believers - 蓮ノ空女学院スクールアイドルクラブ
        3. 光の中で花咲いて - 蓮ノ空女学院スクールアイドルクラブ
        ...
      render: text
    validations:
      required: true
