<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moderation · Love Live! Song Rankings</title>
<style>
:root{--bg:#1a1a2e;--bg-card:#222244;--bg-card2:#2a2a4a;--text:#eee;--text-dim:#999;--border:#333366;--pink:#fb8a9b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px}
header{text-align:center;padding:20px 0;border-bottom:2px solid var(--pink);margin-bottom:20px}
header h1{font-size:1.5rem;color:var(--pink)}
a{color:var(--pink)}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
input{background:var(--bg-card2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:.9rem}
.btn{background:var(--pink);color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:.9rem;cursor:pointer;font-weight:600}
.btn.sec{background:var(--bg-card2);color:var(--text);border:1px solid var(--border)}
.btn.rej{background:#c0392b}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.muted{color:var(--text-dim);font-size:.82rem}
.preview{margin-top:10px;max-height:240px;overflow-y:auto;background:var(--bg-card2);border-radius:6px;padding:8px;font-size:.82rem;display:none}
.preview.show{display:block}
.pi{display:flex;gap:8px;padding:2px 0}.pi .p{width:28px;text-align:right;color:var(--text-dim)}
.miss{color:#ff7043}
.msg{padding:10px;border-radius:6px;margin:10px 0;font-size:.9rem}
.msg.err{background:#3a1b1b;color:#f88}
</style>
</head>
<body>
<div class="container">
  <header><h1>♡ Moderation Queue ♡</h1><p class="muted"><a href="index.html">← rankings</a></p></header>
  <div class="card row">
    <label class="muted">Admin token</label>
    <input id="token" type="password" placeholder="admin token" style="flex:1">
    <button class="btn" id="loadBtn">Load queue</button>
  </div>
  <div id="msg"></div>
  <div id="queue"></div>
</div>
<script type="module">
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
$('token').value = localStorage.getItem('rk_admin_token') || '';

$('loadBtn').addEventListener('click', load);
async function load(){
  const token = $('token').value.trim();
  localStorage.setItem('rk_admin_token', token);
  $('msg').innerHTML=''; $('queue').innerHTML='';
  try {
    const d = await (await fetch('/api/admin/pending',{headers:{'x-admin-token':token}})).json();
    if (d.error) throw new Error(d.error);
    if (!d.rankings.length){ $('queue').innerHTML='<div class="card muted">No pending rankings. 🎉</div>'; return; }
    $('queue').innerHTML = d.rankings.map(r => `
      <div class="card" data-id="${r.id}">
        <div class="row">
          <div style="flex:1">
            <strong>${esc(r.ranker_name)}</strong> ${r.title?`<span class="muted">· ${esc(r.title)}</span>`:''}
            <div class="muted">#${r.id} · scope: ${esc(r.scope_type)}${r.scope_ref?':'+esc(r.scope_ref):''} · ${r.matched_count}/${r.item_count} matched · ${esc((r.created_at||'').slice(0,16))}</div>
          </div>
          <button class="btn sec" data-act="preview">Preview</button>
          <button class="btn" data-act="approve">Approve</button>
          <button class="btn rej" data-act="reject">Reject</button>
        </div>
        <div class="preview" data-role="preview"></div>
      </div>`).join('');
    $('queue').querySelectorAll('[data-id]').forEach(card => {
      const id = card.dataset.id;
      card.querySelector('[data-act=approve]').onclick = () => moderate(id,'approve',card);
      card.querySelector('[data-act=reject]').onclick  = () => moderate(id,'reject',card);
      card.querySelector('[data-act=preview]').onclick = () => preview(id,card);
    });
  } catch(e){ $('msg').innerHTML=`<div class="msg err">${esc(e.message)}</div>`; }
}
async function preview(id,card){
  const box = card.querySelector('[data-role=preview]');
  if (box.classList.contains('show')){ box.classList.remove('show'); return; }
  const d = await (await fetch('/api/rankings/'+id)).json();
  box.innerHTML = d.items.map(it => `<div class="pi"><span class="p">${it.position}.</span><span>${it.song_id?esc(it.name):`<span class="miss">${esc(it.custom_name||it.raw_line)} (unmatched)</span>`}</span></div>`).join('');
  box.classList.add('show');
}
async function moderate(id,action,card){
  const token=$('token').value.trim();
  const d = await (await fetch('/api/admin/rankings/'+id,{method:'POST',headers:{'content-type':'application/json','x-admin-token':token},body:JSON.stringify({action})})).json();
  if (d.error){ $('msg').innerHTML=`<div class="msg err">${esc(d.error)}</div>`; return; }
  card.remove();
  if (!$('queue').querySelector('[data-id]')) $('queue').innerHTML='<div class="card muted">No pending rankings. 🎉</div>';
}
if ($('token').value) load();
</script>
</body>
</html>
