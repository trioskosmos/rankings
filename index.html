<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hasunosora Song Rankings</title>
<style>
:root {
  --pink: #fb8a9b;
  --bg: #1a1a2e;
  --bg-card: #222244;
  --bg-card2: #2a2a4a;
  --text: #eee;
  --text-dim: #999;
  --border: #333366;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.container { max-width:1000px; margin:0 auto; padding:20px; }
header { text-align:center; padding:30px 0; border-bottom:2px solid var(--pink); margin-bottom:30px; }
header h1 { font-size:2rem; color:var(--pink); }
header p { color:var(--text-dim); margin-top:5px; font-size:0.9rem; }
nav { display:flex; gap:10px; justify-content:center; margin:20px 0; flex-wrap:wrap; }
nav button { background:var(--bg-card); color:var(--text); border:1px solid var(--border); padding:10px 24px; border-radius:8px; cursor:pointer; font-size:0.95rem; transition:all .2s; }
nav button:hover, nav button.active { border-color:var(--pink); color:var(--pink); }
nav button.active { background:var(--pink); color:#fff; border-color:var(--pink); }
.section { display:none; }
.section.active { display:block; }
.profile-bar { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.profile-bar label { color:var(--text-dim); font-size:0.9rem; }
.profile-bar select { background:var(--bg-card); color:var(--text); border:1px solid var(--border); padding:8px 12px; border-radius:6px; font-size:0.95rem; }
.song-list { display:flex; flex-direction:column; gap:6px; }
.song-item { display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; transition:all .2s; cursor:pointer; }
.song-item:hover { border-color:var(--pink); }
.song-rank { font-size:1.2rem; font-weight:bold; width:36px; text-align:center; color:var(--pink); flex-shrink:0; }
.song-color-bar { width:4px; height:40px; border-radius:2px; flex-shrink:0; }
.song-info { flex:1; min-width:0; }
.song-name { font-size:1rem; font-weight:500; }
.song-artist { font-size:0.8rem; color:var(--text-dim); margin-top:2px; }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; margin-top:20px; }
.stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:16px; cursor:pointer; transition:all .2s; }
.stat-card:hover { border-color:var(--pink); }
.stat-card .rn { font-size:1.5rem; font-weight:bold; color:var(--pink); }
.stat-card .sn { font-size:1rem; margin:4px 0; }
.stat-card .sa { font-size:0.8rem; color:var(--text-dim); }
.stat-card .bar { height:4px; border-radius:2px; margin-top:8px; background:var(--bg-card2); overflow:hidden; }
.stat-card .bf { height:100%; border-radius:2px; }
.song-detail { background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:20px; margin-bottom:20px; }
.song-detail h2 { font-size:1.5rem; margin-bottom:4px; }
.song-detail .meta { color:var(--text-dim); font-size:0.9rem; margin-bottom:16px; }
.ranking-list { display:flex; flex-direction:column; gap:6px; }
.ranking-item { display:flex; align-items:center; gap:12px; padding:8px 14px; background:var(--bg-card2); border-radius:6px; cursor:pointer; }
.ranking-item .pos { font-weight:bold; color:var(--pink); width:30px; }
.ranking-item .name { flex:1; }
.compare-container { display:flex; gap:20px; flex-wrap:wrap; }
.compare-col { flex:1; min-width:280px; }
.compare-col h3 { color:var(--pink); margin-bottom:10px; }
.legend { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; margin:16px 0; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:0.85rem; color:var(--text-dim); }
.legend-dot { width:12px; height:12px; border-radius:50%; }
.search-box { width:100%; padding:10px 14px; background:var(--bg-card); color:var(--text); border:1px solid var(--border); border-radius:8px; font-size:1rem; margin-bottom:12px; }
.search-box:focus { outline:none; border-color:var(--pink); }
.agreement-bar { display:flex; align-items:center; gap:24px; padding:8px 14px; background:var(--bg-card2); border-radius:6px; margin-bottom:16px; font-size:0.85rem; flex-wrap:wrap; }
.agreement-bar .bt { flex:1; height:6px; background:var(--bg); border-radius:3px; overflow:hidden; min-width:80px; }
.agreement-bar .bf { height:100%; border-radius:3px; }
@media (max-width:600px) { .container{padding:12px;} header h1{font-size:1.4rem;} .song-item{padding:8px 10px;} .song-rank{width:28px;font-size:1rem;} .profile-bar{flex-direction:column;align-items:stretch;} .compare-container{flex-direction:column;} }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>♡ Hasunosora Song Rankings ♡</h1>
    <p>蓮ノ空女学院スクールアイドルクラブ — submit your ranking as a PR adding a <code>.txt</code> file to <strong>data/rankings/</strong></p>
  </header>
  <nav id="nav">
    <button class="active" data-tab="ranking">Ranking</button>
    <button data-tab="all">Aggregate</button>
    <button data-tab="song">Per Song</button>
    <button data-tab="compare">Compare</button>
  </nav>
  <div class="section active" id="section-ranking">
    <div class="profile-bar">
      <label>Profile:</label>
      <select id="profileSelect"></select>
    </div>
    <div class="legend" id="legend"></div>
    <div id="profileInfo" style="color:var(--text-dim);font-size:0.9rem;margin-bottom:12px"></div>
    <div class="song-list" id="songList"></div>
  </div>
  <div class="section" id="section-all">
    <h2 style="color:var(--pink);margin-bottom:16px">Aggregate Leaderboard</h2>
    <p style="color:var(--text-dim);margin-bottom:16px;font-size:0.9rem">Average rank across all profiles. Unranked songs get #36.</p>
    <div id="allContent"></div>
  </div>
  <div class="section" id="section-song">
    <input class="search-box" id="songSearch" placeholder="Search songs...">
    <div id="songDetail"></div>
    <div id="songRankingList"></div>
  </div>
  <div class="section" id="section-compare">
    <div class="profile-bar">
      <label>A:</label><select id="compareA"></select>
      <label>B:</label><select id="compareB"></select>
    </div>
    <div id="compareContent"></div>
  </div>
</div>
<script>
const SONGS = [

  {id:"505",name:"AWOKE",artist:"DOLLCHESTRA",color:"#e89ac7",releasedOn:"2023-03-29"},
  {id:"836",name:"チャーミングな花束を！",artist:"蓮ノ空女学院スクールアイドルクラブ",color:"#fb8a9b",releasedOn:"2025-12-24"},
  {id:"697",name:"ジョーショーキリュー",artist:"みらくらぱーく！",color:"#f7c86a",releasedOn:"2024-12-04"},
  {id:"880",name:"不思議と君とライブラリー",artist:"スリーズブーケ",color:"#6ab0d9",releasedOn:"2026-04-08"},
  {id:"886",name:"センパイ",artist:"みらくらぱーく！",color:"#f7c86a",releasedOn:"2026-04-08"},
  {id:"882",name:"EdelinieN",artist:"Edel Note",color:"#a8d8a8",releasedOn:"2026-04-08"},
  {id:"879",name:"トモダチになれる場所",artist:"みらくらぱーく！",color:"#f7c86a",releasedOn:"2026-04-08"},
  {id:"787",name:"アイドゥーミー！",artist:"蓮ノ空女学院スクールアイドルクラブ",color:"#fb8a9b",releasedOn:"2025-07-09"},
  {id:"756",name:"Retrofuture",artist:"Edel Note",color:"#a8d8a8",releasedOn:"2025-05-21"},
  {id:"883",name:"今、過去、未来の三原色",artist:"蓮ノ空女学院スクールアイドルクラブ",color:"#fb8a9b",releasedOn:"2026-04-15"},
  {id:"826",name:"一生に夢が咲くように",artist:"蓮ノ空女学院スクールアイドルクラブ",color:"#fb8a9b",releasedOn:"2026-04-15"},
  {id:"889",name:"ハナ咲けばユメ駆ける",artist:"蓮ノ空女学院スクールアイドルクラブ",color:"#fb8a9b",releasedOn:"2026-06-03"},
  {id:"859",name:"雪舞う空と二秒の永遠",artist:"蓮ノ空女学院スクールアイドルクラブ",color:"#fb8a9b",releasedOn:"2026-04-15"}
];

const UNIT_COLORS = {
  '蓮ノ空女学院スクールアイドルクラブ':'#fb8a9b','スリーズブーケ':'#6ab0d9','DOLLCHESTRA':'#e89ac7',
  'みらくらぱーく！':'#f7c86a','Edel Note':'#a8d8a8','村野さやか':'#ff9eb5','日野下花帆':'#ffd700',
  '大沢瑠璃乃':'#c8a0e0','日野下花帆、村野さやか、大沢瑠璃乃':'#c9a0dc'
};

let profiles = [];
let currentProfile = null;

function getSong(id) { return SONGS.find(s => s.id === id); }

function getRank(name, songId) {
  const p = profiles.find(r => r.name === name);
  if (!p) return null;
  const idx = p.ids.indexOf(songId);
  return idx === -1 ? null : idx + 1;
}

function parseLine(line) {
  line = line.trim();
  if (!line) return null;
  let namePart = line.replace(/^\d+[\.\)、]\s*/, '');
  namePart = namePart.replace(/\s*-\s*[^-]+$/, '').trim();
  namePart = namePart.replace(/[「」"']/g, '');
  if (!namePart) return null;
  let m = SONGS.find(s => s.name === namePart);
  if (m) return m.id;
  m = SONGS.find(s => s.name.includes(namePart) || namePart.includes(s.name));
  return m ? m.id : null;
}

function isNameLine(line) {
  return line.trim() && !/^\s*\d+[\.\)、]/.test(line) && !line.includes(' - ');
}

function parseProfiles(text) {
  const lines = text.split('\n');
  const result = [];
  let currentName = null;
  let ids = [];
  let unmatched = 0;
  for (const line of lines) {
    if (isNameLine(line)) {
      if (currentName && ids.length) result.push({ name: currentName, ids, unmatched });
      currentName = line.trim();
      ids = [];
      unmatched = 0;
    } else {
      const id = parseLine(line);
      if (id) ids.push(id);
      else if (line.trim()) unmatched++;
    }
  }
  if (currentName && ids.length) result.push({ name: currentName, ids, unmatched });
  return result.length ? result : [{ name: 'unknown', ids: [], unmatched: 0 }];
}

async function loadRankings() {
  try {
    const mr = await fetch('data/rankings/manifest.json');
    const manifest = await mr.json();
    const files = manifest.files || manifest;
    profiles = [];
    for (const f of files) {
      try {
        const r = await fetch('data/rankings/' + f);
        const text = await r.text();
        profiles.push(...parseProfiles(text));
      } catch (e) { console.warn('Failed:', f, e); }
    }
  } catch {
    try {
      const r = await fetch('data/rankings/hasu6thbelluna.txt');
      const text = await r.text();
      profiles = parseProfiles(text);
    } catch {
      profiles = [{ name: 'trioskosmos', ids: SONGS.map(s => s.id), unmatched: 0 }];
    }
  }
  if (!currentProfile || !profiles.find(p => p.name === currentProfile))
    currentProfile = profiles[0]?.name || 'trioskosmos';
  renderAll();
}

function renderAll() {
  renderLegend();
  renderProfileSelects();
  renderRanking();
  if (document.getElementById('section-all').classList.contains('active')) renderAggregate();
  if (document.getElementById('section-song').classList.contains('active')) renderSongSearch();
  if (document.getElementById('section-compare').classList.contains('active')) renderCompare();
}

function renderLegend() {
  document.getElementById('legend').innerHTML = Object.keys(UNIT_COLORS).map(n =>
    '<span class="legend-item"><span class="legend-dot" style="background:'+UNIT_COLORS[n]+'"></span>'+n+'</span>'
  ).join('');
}

function renderProfileSelects() {
  const names = profiles.map(p => p.name);
  ['profileSelect','compareA','compareB'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const val = sel.value;
    sel.innerHTML = names.map(n => '<option value="'+n+'">'+n+'</option>').join('');
    if (names.includes(val)) sel.value = val;
  });
  const ps = document.getElementById('profileSelect');
  if (ps && names.includes(currentProfile)) ps.value = currentProfile;
  else if (ps && names.length) { ps.value = names[0]; currentProfile = names[0]; }
}

function createSongEl(song, rank) {
  if (!song) {
    const d = document.createElement('div');
    d.className = 'song-item';
    d.style.opacity = '0.4';
    d.innerHTML = '<div class="song-info"><div class="song-name" style="color:var(--text-dim)">(unknown)</div></div>';
    return d;
  }
  const div = document.createElement('div');
  div.className = 'song-item';
  div.addEventListener('click', () => showSongDetail(song.id));
  div.innerHTML = '<div class="song-rank">#'+rank+'</div><div class="song-color-bar" style="background:'+song.color+'"></div><div class="song-info"><div class="song-name">'+song.name+'</div><div class="song-artist">'+song.artist+'</div></div>';
  return div;
}

function renderRanking() {
  const list = document.getElementById('songList');
  const p = profiles.find(r => r.name === currentProfile);
  const info = document.getElementById('profileInfo');
  if (!p) { list.innerHTML = ''; info.textContent = ''; return; }
  info.textContent = p.ids.length + ' songs ranked' + (p.unmatched ? ' ('+p.unmatched+' unmatched lines)' : '');
  list.innerHTML = '';
  const set = new Set(p.ids);
  p.ids.forEach((id, i) => list.appendChild(createSongEl(getSong(id), i + 1)));
  SONGS.filter(s => !set.has(s.id)).forEach(s => { const el = createSongEl(s, '—'); el.style.opacity = '0.5'; list.appendChild(el); });
}

function renderAggregate() {
  const el = document.getElementById('allContent');
  const active = profiles.filter(p => p.ids.length > 0);
  if (!active.length) { el.innerHTML = '<p style="color:var(--text-dim)">No profiles yet.</p>'; return; }
  const total = active.length;
  const data = SONGS.map(song => {
    const ranks = active.map(p => { const i = p.ids.indexOf(song.id); return i === -1 ? 36 : i + 1; });
    return { song, avg: ranks.reduce((a,b)=>a+b,0)/total };
  }).sort((a,b) => a.avg - b.avg);
  el.innerHTML = '<div class="stats-grid">' + data.map((item,i) => {
    const s = item.song;
    return '<div class="stat-card" onclick="showSongDetail(\''+s.id+'\')"><div class="rn">#'+(i+1)+'</div><div class="sn">'+s.name+'</div><div class="sa">'+s.artist+' · avg '+item.avg.toFixed(1)+'</div><div class="bar"><div class="bf" style="width:'+((1-i/SONGS.length)*100)+'%;background:'+s.color+'"></div></div></div>';
  }).join('') + '</div>';
}

function showSongDetail(songId) {
  switchTab('song');
  const song = getSong(songId);
  if (!song) return;
  document.getElementById('songDetail').innerHTML = '<div class="song-detail"><h2>'+song.name+'</h2><div class="meta"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+song.color+';margin-right:6px;vertical-align:middle"></span>'+song.artist+(song.releasedOn?' · '+song.releasedOn:'')+'</div></div>';
  const list = profiles.map(p => ({ name: p.name, pos: getRank(p.name, songId) })).filter(r => r.pos !== null).sort((a,b) => a.pos - b.pos);
  document.getElementById('songRankingList').innerHTML = list.length ? list.map(r => '<div class="ranking-item"><span class="pos">#'+r.pos+'</span><span class="name">'+r.name+'</span></div>').join('') : '<p style="color:var(--text-dim);padding:12px">Not ranked by anyone yet.</p>';
  document.getElementById('songSearch').value = song.name;
}

function renderSongSearch() {
  const q = document.getElementById('songSearch').value.toLowerCase();
  const list = document.getElementById('songRankingList');
  const matching = q ? SONGS.filter(s => s.name.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q)) : [];
  list.innerHTML = matching.length ? matching.map(s => {
    const c = profiles.filter(p => p.ids.includes(s.id)).length;
    return '<div class="song-item" onclick="showSongDetail(\''+s.id+'\')"><div class="song-color-bar" style="background:'+s.color+'"></div><div class="song-info"><div class="song-name">'+s.name+'</div><div class="song-artist">'+s.artist+' · ranked by '+c+'</div></div></div>';
  }).join('') : '<p style="color:var(--text-dim);padding:12px">No matching songs.</p>';
  if (!q) list.innerHTML = '<p style="color:var(--text-dim);padding:12px">Type a song name to search.</p>';
}

function renderCompare() {
  const el = document.getElementById('compareContent');
  const aName = document.getElementById('compareA').value;
  const bName = document.getElementById('compareB').value;
  if (!aName || !bName || !profiles.find(p=>p.name===aName) || !profiles.find(p=>p.name===bName)) {
    el.innerHTML = '<p style="color:var(--text-dim)">Select two profiles.</p>'; return;
  }
  const aIds = profiles.find(p=>p.name===aName).ids;
  const bIds = profiles.find(p=>p.name===bName).ids;
  const aSongs = aIds.map(id => getSong(id)).filter(Boolean);
  const bSongs = bIds.map(id => getSong(id)).filter(Boolean);
  const diffs = SONGS.map(s => {
    const pA = getRank(aName, s.id) || 36;
    const pB = getRank(bName, s.id) || 36;
    return { song: s, pA, pB, absDiff: Math.abs(pA - pB) };
  }).sort((a,b) => b.absDiff - a.absDiff);
  const close = diffs.filter(d => d.absDiff <= 3).length;
  el.innerHTML = '<div class="agreement-bar"><span>Agreement: <strong>'+(close/SONGS.length*100).toFixed(0)+'%</strong> within ±3</span><div class="bt"><div class="bf" style="width:'+(close/SONGS.length*100).toFixed(0)+'%;background:var(--pink)"></div></div></div><div class="compare-container"><div class="compare-col"><h3>'+aName+' ('+aSongs.length+')</h3>'+aSongs.map((s,i)=>'<div class="song-item" onclick="showSongDetail(\''+s.id+'\')"><div class="song-rank">#'+(i+1)+'</div><div class="song-color-bar" style="background:'+s.color+'"></div><div class="song-info"><div class="song-name">'+s.name+'</div></div></div>').join('')+'</div><div class="compare-col"><h3>'+bName+' ('+bSongs.length+')</h3>'+bSongs.map((s,i)=>'<div class="song-item" onclick="showSongDetail(\''+s.id+'\')"><div class="song-rank">#'+(i+1)+'</div><div class="song-color-bar" style="background:'+s.color+'"></div><div class="song-info"><div class="song-name">'+s.name+'</div></div></div>').join('')+'</div></div><h3 style="color:var(--pink);margin:20px 0 10px">Biggest Differences</h3>'+diffs.slice(0,10).map(d=>'<div class="ranking-item" onclick="showSongDetail(\''+d.song.id+'\')"><div class="song-color-bar" style="background:'+d.song.color+';width:4px;height:30px;border-radius:2px;flex-shrink:0"></div><span style="flex:1">'+d.song.name+'</span><span style="color:var(--text-dim);font-size:0.85rem">#'+d.pA+' vs #'+d.pB+'</span></div>').join('');
}

function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-'+tab).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-tab="'+tab+'"]').classList.add('active');
}

document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    switchTab(btn.dataset.tab);
    if (btn.dataset.tab === 'all') renderAggregate();
    if (btn.dataset.tab === 'song') { document.getElementById('songDetail').innerHTML = ''; document.getElementById('songRankingList').innerHTML = '<p style="color:var(--text-dim);padding:12px">Type a song name to search.</p>'; }
    if (btn.dataset.tab === 'compare') renderCompare();
  });
});
document.getElementById('profileSelect').addEventListener('change', () => { currentProfile = document.getElementById('profileSelect').value; renderRanking(); });
document.getElementById('songSearch').addEventListener('input', renderSongSearch);
['compareA','compareB'].forEach(id => document.getElementById(id).addEventListener('change', renderCompare));

loadRankings();
</script>
</body>
</html>
