<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Live! Song Rankings</title>
<style>
:root{--bg:#1a1a2e;--bg-card:#222244;--bg-card2:#2a2a4a;--text:#eee;--text-dim:#999;--border:#333366}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:20px}
header{text-align:center;padding:24px 0;border-bottom:2px solid #fb8a9b;margin-bottom:20px}
header h1{font-size:1.8rem;color:#fb8a9b}
header p{color:var(--text-dim);margin-top:4px;font-size:.85rem}
nav{display:flex;gap:8px;justify-content:center;margin:16px 0;flex-wrap:wrap}
nav button{background:var(--bg-card);color:var(--text);border:1px solid var(--border);padding:8px 20px;border-radius:6px;cursor:pointer;font-size:.9rem;transition:all .2s}
nav button:hover,nav button.active{border-color:#fb8a9b;color:#fb8a9b}
nav button.active{background:#fb8a9b;color:#fff;border-color:#fb8a9b}
.section{display:none}
.section.active{display:block}
.bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.bar label{color:var(--text-dim);font-size:.85rem}
.bar select,.bar input[type=checkbox]{background:var(--bg-card);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:5px;font-size:.9rem;max-width:200px}
.bar label.cb{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:.85rem;color:var(--text-dim)}
.list{display:flex;flex-direction:column;gap:5px}
.item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;transition:all .2s;cursor:pointer}
.item:hover{border-color:#fb8a9b}
.rk{font-size:1.1rem;font-weight:bold;width:32px;text-align:center;color:#fb8a9b;flex-shrink:0}
.sc{width:4px;height:36px;border-radius:2px;flex-shrink:0}
.inf{flex:1;min-width:0}
.nm{font-size:.95rem;font-weight:500}
.ar{font-size:.78rem;color:var(--text-dim);margin-top:1px}
.det{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.det h2{font-size:1.3rem;margin-bottom:3px}
.det .mt{color:var(--text-dim);font-size:.85rem;margin-bottom:12px}
.rlist{display:flex;flex-direction:column;gap:5px}
.ritem{display:flex;align-items:center;gap:10px;padding:6px 12px;background:var(--bg-card2);border-radius:5px;cursor:pointer}
.ritem .pos{font-weight:bold;color:#fb8a9b;width:28px}
.ritem .nm2{flex:1}
.cc{display:flex;gap:16px;flex-wrap:wrap}
.cl{flex:1;min-width:260px}
.cl h3{color:#fb8a9b;font-size:1rem;margin-bottom:8px}
.sbox{width:100%;padding:8px 12px;background:var(--bg-card);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:.9rem;margin-bottom:10px}
.sbox:focus{outline:none;border-color:#fb8a9b}
.abar{display:flex;align-items:center;gap:16px;padding:6px 12px;background:var(--bg-card2);border-radius:5px;margin-bottom:12px;font-size:.82rem;flex-wrap:wrap}
.abar .bt{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden;min-width:60px}
.abar .bf{height:100%;border-radius:3px;background:#fb8a9b}
.unr{opacity:.4}
.votes{font-size:.78rem;color:var(--text-dim);margin-top:2px;display:flex;gap:12px;flex-wrap:wrap}
.votes .hi{color:#4caf50}
.votes .lo{color:#ff7043}
/* Matrix grid */
.matrix-wrap{width:100%;margin-bottom:12px}
.matrix{display:grid;gap:2px;width:100%}
.matrix .ml{font-size:.75rem;color:var(--text-dim);padding:6px 8px;display:flex;align-items:center;justify-content:flex-end;font-weight:bold;white-space:nowrap}
.matrix .mt{font-size:.75rem;color:var(--text-dim);padding:6px 8px;display:flex;align-items:center;justify-content:center;font-weight:bold;white-space:nowrap;writing-mode:vertical-lr;transform:rotate(180deg)}
.matrix .mc{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:.75rem;font-weight:bold;transition:all .2s;border:2px solid transparent;overflow:hidden}
.matrix .mc:hover{border-color:#fb8a9b;box-shadow:0 0 10px rgba(251,138,155,.5);z-index:2}
.matrix .mc.sel{border-color:#fff;box-shadow:0 0 12px rgba(251,138,155,.5)}
.matrix .mc .pct{font-size:.9rem;line-height:1}
.matrix .mc .sub{font-size:.55rem;opacity:.7;margin-top:1px}
.matrix .mc.di{opacity:.3;cursor:default}
.matrix .mc.di:hover{transform:none;border-color:transparent}
/* Compare overlay */
.cover{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:100;overflow-y:auto;padding:20px}
.cover.show{display:block}
.cover-inner{max-width:1100px;margin:40px auto;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:24px;position:relative}
.cover-close{position:sticky;top:0;float:right;background:var(--bg-card);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;z-index:10}
.cover-close:hover{background:#fb8a9b;color:#fff}
.delta{font-size:.85rem;font-weight:bold;width:48px;text-align:center;flex-shrink:0}
.delta.d0{color:var(--text-dim)}
.delta.dp{color:#4caf50}
.delta.dn{color:#ff7043}
@media(max-width:700px){.container{padding:10px}header h1{font-size:1.3rem}.item{padding:6px 8px}.rk{width:26px;font-size:1rem}.bar{flex-direction:column;align-items:stretch}.cc{flex-direction:column}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>♡ Love Live! Song Rankings ♡</h1>
    <p>Rank any songs — <a href="https://github.com/trioskosmos/rankings/tree/main/data/rankings" target="_blank" style="color:#fb8a9b">add your <code>.txt</code> here</a> via PR (or just yell at trioskosmos to add them)</p>
  </header>
  <nav id="nav">
    <button class="active" data-tab="agg">Aggregate</button>
    <button data-tab="rank">Ranking</button>
    <button data-tab="song">Per Song</button>
    <button data-tab="cmp">Compare</button>
  </nav>

  <div class="section active" id="section-agg">
    <div class="bar">
      <label>Sort:</label><select id="sortAgg"><option value="rank">Avg rank</option><option value="rank-desc">Avg rank (worst)</option><option value="median">Median</option><option value="stddev">Std deviation</option><option value="name">Name A-Z</option><option value="date">Release date</option><option value="artist">Artist</option><option value="series">Series</option></select>
      <label>File:</label><select id="filterAggFile"><option value="">All files</option></select>
      <label>Series:</label><select id="filterAgg"><option value="">All series</option></select>
      <label>Artist:</label><select id="filterAggArtist"><option value="">All artists</option></select>
      <label class="cb"><input type="checkbox" id="hideUnranked" checked> Hide unranked</label>
    </div>
    <div id="aggContent"></div>
  </div>

  <div class="section" id="section-rank">
    <div class="bar">
      <label>Profile:</label><select id="selProfile"></select>
      <label>Sort:</label><select id="sortRank"><option value="default">Default (rank)</option><option value="name">Name A-Z</option><option value="name-desc">Name Z-A</option><option value="date">Release (old)</option><option value="date-desc">Release (new)</option><option value="artist">Artist A-Z</option><option value="artist-desc">Artist Z-A</option><option value="series">Series</option></select>
      <label>File:</label><select id="filterRankFile"><option value="">All files</option></select>
      <label>Series:</label><select id="filterRank"><option value="">All series</option></select>
      <label>Artist:</label><select id="filterRankArtist"><option value="">All artists</option></select>
      <label class="cb"><input type="checkbox" id="hideUnrankedRank" checked> Hide unranked</label>
    </div>
    <div id="info" style="color:var(--text-dim);font-size:.85rem;margin-bottom:10px"></div>
    <div class="list" id="songList"></div>
  </div>

  <div class="section" id="section-song">
    <input class="sbox" id="songSearch" placeholder="Search songs...">
    <div id="songDetail"></div>
    <div id="songResults"></div>
  </div>

  <div class="section" id="section-cmp">
    <div class="matrix-wrap" id="cmpGrid"></div>
  </div>
</div>

<div class="cover" id="cmpCover" onclick="if(event.target===this)closeCmpDetail()">
  <div class="cover-inner">
    <button class="cover-close" onclick="closeCmpDetail()">✕</button>
    <div id="cmpDetailTitle" style="color:#fb8a9b;font-size:1.1rem;margin-bottom:12px"></div>
    <div id="cmpDetailBody"></div>
  </div>
</div>

<script>
// ---- DATA LOADING ----
let SONGS=[],SM={},SERIES={},SERIES_COLORS={},ARTIST_NAMES={},ARTISTS_LIST=[],SERIES_LIST=[];

async function loadData(){
  try{
    const[sr,ar]=await Promise.all([fetch('data/series-info.json').then(r=>r.json()),fetch('data/artists-info.json').then(r=>r.json())]);
    sr.forEach(s=>{SERIES[s.id]=s.name;SERIES_COLORS[s.id]=s.color;});
    ar.forEach(a=>{ARTIST_NAMES[a.id]=a.name;});
    const songsData=await(await fetch('data/song-info.json')).json();
    SONGS=songsData.map(s=>({id:String(s.id),name:s.name,en:s.englishName||'',artist:(s.artists&&s.artists.length?ARTIST_NAMES[s.artists[0].id]||'Unknown':'Unknown'),allArtists:[...new Set(s.artists.map(a=>ARTIST_NAMES[a.id]||'Unknown').filter(Boolean))],series:(s.seriesIds&&s.seriesIds.length?SERIES[String(s.seriesIds[0])]||'Unknown':'Unknown'),color:(s.seriesIds&&s.seriesIds.length?SERIES_COLORS[String(s.seriesIds[0])]||'#888':'#888'),date:s.releasedOn||''}));
    SONGS.forEach(s=>SM[s.id]=s);
    const aS=new Set(),sS=new Set();SONGS.forEach(s=>{s.allArtists.forEach(a=>aS.add(a));sS.add(s.series);});
    ARTISTS_LIST=[...aS].sort();SERIES_LIST=[...sS].sort();
    ['filterRank','filterAgg'].forEach(id=>{const s=document.getElementById(id);if(!s)return;const v=s.value;s.innerHTML='<option value="">All series</option>'+SERIES_LIST.map(i=>'<option value="'+i+'">'+i+'</option>').join('');if(SERIES_LIST.includes(v))s.value=v;});
    ['filterRankArtist','filterAggArtist'].forEach(id=>{const s=document.getElementById(id);if(!s)return;const v=s.value;s.innerHTML='<option value="">All artists</option>'+ARTISTS_LIST.map(i=>'<option value="'+i+'">'+i+'</option>').join('');if(ARTISTS_LIST.includes(v))s.value=v;});
    await loadRankings();
  }catch(e){console.error('Failed:',e);document.body.innerHTML='<div class="container"><p style="color:red">Failed to load data.</p></div>';}
}

// ---- RANKINGS ----
let profiles=[],current=null;
function gs(id){return SM[id]}
function gr(profile, sid){
  if(!profile)return null;
  const i=profile.ids.indexOf(sid);
  return i===-1?null:i+1;
}
function isName(l){return l.trim()&&!/^\s*\d+[\.\)、]/.test(l)&&!l.includes(' - ')}
function cleanName(n){return n.replace(/[「」"'（）\(\)]/g,'').trim();}
function parseLine(l){
  l=l.trim();if(!l)return null;
  let n=l.replace(/^\d+[\.\)、]\s*/,'').replace(/\s*-\s*[^-]+$/,'').trim();
  n=cleanName(n);if(!n)return null;
  let m=SONGS.find(s=>s.name===n||cleanName(s.name)===n);if(m)return m.id;
  m=SONGS.find(s=>s.name.includes(n)||n.includes(s.name)||cleanName(s.name).includes(n)||n.includes(cleanName(s.name))||(s.en&&s.en.includes(n)));return m?m.id:null;
}
function parseProfiles(text, sourceFile){
  const lines=text.split('\n'),res=[];let cur=null,ids=[],unr=0;
  for(const l of lines){
    if(isName(l)){if(cur&&ids.length)res.push({name:cur.trim(),ids,unr,source:sourceFile||''});cur=l.trim();ids=[];unr=0;}
    else{const id=parseLine(l);if(id)ids.push(id);else if(l.trim())unr++;}
  }
  if(cur&&ids.length)res.push({name:cur.trim(),ids,unr,source:sourceFile||''});
  return res.length?res:[{name:'unknown',ids:[],unr:0,source:sourceFile||''}];
}
async function loadRankings(){
  try{
    const dir=await fetch('https://api.github.com/repos/trioskosmos/rankings/contents/data/rankings');
    const files=await dir.json();
    const raw=[];
    for(const f of files){
      if(!f.name.endsWith('.txt')) continue;
      try{
        const r=await fetch(f.download_url);
        raw.push(...parseProfiles(await r.text(), f.name));
      }catch(e){console.warn('Failed:',f.name,e)}
    }
    // Keep all profiles, label duplicates with source file
    const nameCount={}; raw.forEach(p=>{nameCount[p.name]=(nameCount[p.name]||0)+1;});
    profiles = raw.map((p,i)=>{
      p._uid='p'+i;
      p._label = nameCount[p.name]>1 ? p.name+' ('+(p.source||'').replace('.txt','')+')' : p.name;
      return p;
    });
  }catch{
    try{const r=await fetch('data/rankings/hasu6thbelluna.txt');profiles=parseProfiles(await r.text());}
    catch{profiles=[]}
    profiles.forEach((p,i)=>{p._uid='p'+i;p._label=p.label||p.name;});
  }
  if(!current||!profiles.find(p=>p._uid===current))
    current=profiles[0]?._uid||'p0';
  // Populate file filter dropdowns
  const srcs=[...new Set(profiles.map(p=>p.source).filter(Boolean))].sort();
  ['filterAggFile','filterRankFile'].forEach(id=>{
    const s=document.getElementById(id);if(!s)return;
    const v=s.value;s.innerHTML='<option value="">All files</option>'+srcs.map(f=>'<option value="'+f+'">'+f.replace('.txt','')+'</option>').join('');
    if(srcs.includes(v))s.value=v;
  });
  renderAll();
}
function rSel(){
  const fileFilter=document.getElementById('filterRankFile')?.value||'';
  const filtered=fileFilter?profiles.filter(p=>p.source===fileFilter):profiles;
  const s=document.getElementById('selProfile');if(!s)return;
  s.innerHTML=filtered.map(p=>'<option value="'+p._uid+'">'+p._label+'</option>').join('');
  if(!s.value&&filtered.length){s.value=filtered[0]._uid;current=filtered[0]._uid;}
  else if(!filtered.length){s.innerHTML='<option value="">No profiles in this file</option>';}
}
function sortSongs(songs,mode){
  const c=[...songs];const cmp={name:(a,b)=>a.name.localeCompare(b.name),'name-desc':(a,b)=>b.name.localeCompare(a.name),date:(a,b)=>(a.date||'9999').localeCompare(b.date||'9999'),'date-desc':(a,b)=>(b.date||'').localeCompare(a.date||''),artist:(a,b)=>a.artist.localeCompare(b.artist),'artist-desc':(a,b)=>b.artist.localeCompare(a.artist),series:(a,b)=>a.series.localeCompare(b.series)||a.name.localeCompare(b.name)};
  if(cmp[mode])c.sort(cmp[mode]);return c;
}
function songHTML(song,extra){return '<div class="sc" style="background:'+(song.color||'#888')+'"></div><div class="inf"><div class="nm">'+song.name+'</div><div class="ar">'+song.artist+(song.series?' · '+song.series:'')+(song.date?' · '+song.date:'')+'</div>'+(extra||'')+'</div>';}
function makeItem(song,rank,extra){if(!song){const d=document.createElement('div');d.className='item unr';d.innerHTML='<div class="inf"><div class="nm" style="color:var(--text-dim)">(unknown)</div></div>';return d;}const d=document.createElement('div');d.className='item';d.addEventListener('click',()=>showSong(song.id));d.innerHTML='<div class="rk">#'+rank+'</div>'+songHTML(song,extra);return d;}
function getFilteredSongs(fS,fA){let s=SONGS;if(fS)s=s.filter(x=>x.series===fS);if(fA)s=s.filter(x=>x.allArtists.includes(fA));return s;}
function median(arr){if(!arr.length)return 0;const s=[...arr].sort((a,b)=>a-b),m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}
function stddev(arr,m){if(arr.length<2)return 0;return Math.sqrt(arr.reduce((s,v)=>s+(v-m)**2,0)/arr.length);}

// ---- RANKING ----
function renderRank(){
  const list=document.getElementById('songList'),p=profiles.find(r=>r._uid===current),info=document.getElementById('info');
  if(!p){list.innerHTML='';info.textContent='';return;}
  const fS=document.getElementById('filterRank').value,fA=document.getElementById('filterRankArtist').value,hideUR=document.getElementById('hideUnrankedRank').checked;
  const allS=getFilteredSongs(fS,fA),ranked=p.ids.map(id=>gs(id)).filter(Boolean).filter(s=>allS.includes(s)),unranked=allS.filter(s=>!p.ids.includes(s.id));
  info.textContent=p.ids.length+' songs ranked · '+allS.length+' match filters'+(hideUR?' (hiding unranked)':'');
  const mode=document.getElementById('sortRank').value;
  const items = hideUR ? ranked : (mode==='default' ? [...ranked,...unranked] : sortSongs([...ranked,...unranked],mode));
  list.innerHTML='';
  items.forEach((s,i)=>{const e=makeItem(s,i+1);if(!p.ids.includes(s.id))e.classList.add('unr');list.appendChild(e);});
}

// ---- AGGREGATE ----
function renderAgg(){
  const el=document.getElementById('aggContent'),mode=document.getElementById('sortAgg').value;
  const fS=document.getElementById('filterAgg').value,fA=document.getElementById('filterAggArtist').value;
  const fileFilter=document.getElementById('filterAggFile')?.value||'';
  const active=(fileFilter?profiles.filter(p=>p.source===fileFilter):profiles).filter(p=>p.ids.length>0);if(!active.length){el.innerHTML='<p style="color:var(--text-dim)">No profiles.</p>';return;}
  const allS=getFilteredSongs(fS,fA),t=active.length;
  const hideZero=document.getElementById('hideUnranked').checked;
  let data=allS.map(song=>{
    const allRanks=active.map(p=>{const i=p.ids.indexOf(song.id);return i===-1?null:i+1;});
    const avgVals=allRanks.map(r=>r===null?36:r);
    const avg=t>0?avgVals.reduce((a,b)=>a+b,0)/t:0;
    const rankedRanks=allRanks.filter(r=>r!==null),med=median(rankedRanks.length?rankedRanks:[36]),sd=stddev(avgVals,avg);
    let hi={name:'',pos:999},lo={name:'',pos:0};
    active.forEach(p=>{const r=gr(p,song.id);if(r!==null){if(r<hi.pos){hi={name:p.name,pos:r}}if(r>lo.pos){lo={name:p.name,pos:r}}}});
    return{song,avg,med,sd,hi,lo,count:rankedRanks.length};
  }).filter(d=>!hideZero||d.count>0);
  const cmp={rank:(a,b)=>a.avg-b.avg,'rank-desc':(a,b)=>b.avg-a.avg,median:(a,b)=>a.med-b.med,stddev:(a,b)=>a.sd-b.sd,name:(a,b)=>a.song.name.localeCompare(b.song.name),date:(a,b)=>(a.song.date||'9999').localeCompare(b.song.date||'9999'),artist:(a,b)=>a.song.artist.localeCompare(b.song.artist),series:(a,b)=>a.song.series.localeCompare(b.song.series)||a.song.name.localeCompare(b.song.name)};
  if(cmp[mode])data.sort(cmp[mode]);
  // Assign avg-rank positions (pre-compute before sort)
  const avgSorted=[...data].sort((a,b)=>a.avg-b.avg);
  avgSorted.forEach((item,i)=>item.rankPos=i+1);
  if(!data.length){el.innerHTML='<p style="color:var(--text-dim)">No songs match filters.</p>';return;}
  el.innerHTML='<div class="list">'+data.map(item=>{const s=item.song;return '<div class="item" onclick="showSong(\''+s.id+'\')"><div class="rk">#'+item.rankPos+'</div>'+songHTML(s,'<div class="votes"><span>avg '+item.avg.toFixed(1)+' · med '+item.med.toFixed(1)+' · σ '+item.sd.toFixed(1)+' ('+item.count+'/'+t+' ranked)</span>'+(item.hi.name?'<span class="hi">▲ '+item.hi.name+' (#'+item.hi.pos+')</span>':'')+(item.lo.name?'<span class="lo">▼ '+item.lo.name+' (#'+item.lo.pos+')</span>':'')+'</div>')+'</div>';}).join('')+'</div>';
}

// ---- PER SONG ----
function showSong(sid){
  switchTab('song');const s=gs(sid);if(!s)return;
  document.getElementById('songDetail').innerHTML='<div class="det"><h2>'+s.name+'</h2><div class="mt">'+(s.en?s.en+' · ':'')+s.artist+' · '+s.series+(s.date?' · '+s.date:'')+'</div></div>';
  const list=profiles.map(p=>({name:p.name,pos:gr(p,sid)})).filter(r=>r.pos!==null).sort((a,b)=>a.pos-b.pos);
  document.getElementById('songResults').innerHTML=list.length?list.map(r=>'<div class="ritem"><span class="pos">#'+r.pos+'</span><span class="nm2">'+r.name+'</span></div>').join(''):'<p style="color:var(--text-dim);padding:12px">Not ranked by anyone.</p>';
  document.getElementById('songSearch').value=s.name;
}
function renderSearch(){
  const q=document.getElementById('songSearch').value.toLowerCase(),list=document.getElementById('songResults');
  const m=q?SONGS.filter(s=>s.name.toLowerCase().includes(q)||s.artist.toLowerCase().includes(q)||(s.en&&s.en.toLowerCase().includes(q))):[];
  list.innerHTML=m.length?m.map(s=>{const c=profiles.filter(p=>p.ids.includes(s.id)).length;return '<div class="item" onclick="showSong(\''+s.id+'\')">'+songHTML(s,'<div class="ar">ranked by '+c+'</div>')+'</div>';}).join(''):'<p style="color:var(--text-dim);padding:12px">No matches.</p>';
  if(!q)list.innerHTML='<p style="color:var(--text-dim);padding:12px">Type a song name to search.</p>';
}

// ---- COMPARE ----
let cmpSel=null;
function renderCmp(){
  if(profiles.length<2){document.getElementById('cmpGrid').innerHTML='<p style="color:var(--text-dim)">Need at least 2 profiles.</p>';return;}
  // Group profiles by source file
  const groups={}; profiles.forEach(p=>{
    const key=p.source||'unknown';
    if(!groups[key])groups[key]=[];
    groups[key].push(p);
  });
  const fileOrder=Object.keys(groups).sort();
  let allHtml='';
  fileOrder.forEach(key=>{
    const list=groups[key];
    if(list.length<2)return;
    allHtml+='<h3 style="color:#fb8a9b;font-size:.95rem;margin:16px 0 8px">'+(key==='unknown'?'Other':key.replace('.txt',''))+'</h3>';
    const n=list.length;
    const matrix=list.map(a=>list.map(b=>{
      if(a===b)return null;
      const shared=a.ids.filter(id=>b.ids.includes(id));
      if(!shared.length)return 0;
      const threshold=Math.max(3,Math.round(shared.length*0.08));
      let c=0;shared.forEach(sid=>{const pA=gr(a,sid),pB=gr(b,sid);if(Math.abs(pA-pB)<=threshold)c++;});
      return Math.round(c/shared.length*100);
    }));
    let html='<div class="matrix" style="grid-template-columns:'+Math.min(80,Math.floor(700/n))+'px repeat('+n+',minmax(40px,1fr))">';
    html+='<div class="ml" style="grid-column:1;grid-row:1"></div>';
    list.forEach((p,i)=>{html+='<div class="mt" style="grid-column:'+(i+2)+';grid-row:1" title="'+p.name+'">'+p.name+'</div>';});
    for(let i=0;i<n;i++){
      html+='<div class="ml" style="grid-column:1;grid-row:'+(i+2)+'" title="'+list[i].name+'">'+list[i].name+'</div>';
      for(let j=0;j<n;j++){
        if(i===j)html+='<div class="mc di" style="grid-column:'+(j+2)+';grid-row:'+(i+2)+'"><span class="pct" style="color:var(--text-dim)">—</span></div>';
        else{
          const v=matrix[i][j];const r=v/100;
          const grn=Math.round(200*r),red=Math.round(200*(1-r));
          const sel=cmpSel&&cmpSel[0]===list[i]&&cmpSel[1]===list[j]?' sel':'';
          html+='<div class="mc'+sel+'" style="grid-column:'+(j+2)+';grid-row:'+(i+2)+';background:rgb('+red+','+grn+',80)" onclick="openCmp(\''+list[i]._uid+'\',\''+list[j]._uid+'\')"><span class="pct">'+v+'%</span><span class="sub">'+list[i].ids.filter(id=>list[j].ids.includes(id)).length+' shared</span></div>';
        }
      }
    }
    html+='</div>';
    allHtml+=html;
  });
  document.getElementById('cmpGrid').innerHTML=allHtml||'<p style="color:var(--text-dim)">No file has 2+ profiles.</p>';
}
function openCmp(uidA,uidB){
  const pa=profiles.find(p=>p._uid===uidA),pb=profiles.find(p=>p._uid===uidB);
  if(!pa||!pb)return;
  cmpSel=[pa,pb];
  showCmpDetail(pa,pb);
}
function closeCmpDetail(){document.getElementById('cmpCover').classList.remove('show');}
function showCmpDetail(pa,pb){
  // Use intersection — only songs both profiles ranked
  const sharedIds=pa.ids.filter(id=>pb.ids.includes(id));
  const cmpSongs=sharedIds.map(id=>gs(id)).filter(Boolean).sort((a,b)=>a.name.localeCompare(b.name));
  if(!cmpSongs.length){document.getElementById('cmpDetailBody').innerHTML='<p style="color:var(--text-dim)">No shared songs.</p>';document.getElementById('cmpCover').classList.add('show');return;}
  const diffs=cmpSongs.map(s=>{const pA=gr(pa,s.id),pB=gr(pb,s.id);return{song:s,pA,pB,abs:Math.abs(pA-pB)};}).sort((a,b)=>b.abs-a.abs);
  const closeCount=diffs.filter(d=>d.abs<=Math.max(3,Math.round(cmpSongs.length*0.08))).length;
  document.getElementById('cmpDetailTitle').textContent=pa.name+' vs '+pb.name+' ('+cmpSongs.length+' shared)';
  document.getElementById('cmpDetailBody').innerHTML=`
    <div class="abar" style="gap:12px">
      <span>Agreement: <strong>${Math.round(closeCount/cmpSongs.length*100)}%</strong> within 8% on ${cmpSongs.length} shared songs</span>
      <div class="bt" style="min-width:100px"><div class="bf" style="width:${Math.round(closeCount/cmpSongs.length*100)}%"></div></div>
    </div>
    <div class="list" style="margin-bottom:16px"><div class="item" style="cursor:default;background:var(--bg-card2);font-weight:bold;font-size:.82rem;color:var(--text-dim)"><div style="width:28px;text-align:center">Δ</div><div class="rk" style="width:28px">#</div><div class="inf">Song</div><div class="rk" style="width:28px">#</div></div>
    ${diffs.map(d=>{const dc=d.abs===0?'d0':d.pA<d.pB?'dp':'dn';return '<div class="item" onclick="closeCmpDetail();showSong(\''+d.song.id+'\')"><div class="delta '+dc+'">'+(d.pA-d.pB>0?'+':'')+(d.pA-d.pB)+'</div><div class="rk" style="width:28px;font-size:.9rem">#'+d.pA+'</div>'+songHTML(d.song)+'<div class="rk" style="width:28px;font-size:.9rem">#'+d.pB+'</div></div>';}).join('')}</div>
    <h3 style="color:#fb8a9b;margin:16px 0 8px;font-size:.95rem">Full Rankings (shared songs only)</h3>
    <div class="cc"><div class="cl"><h3>${pa.name} (${pa.ids.length} total)</h3>${sharedIds.map(id=>gs(id)).filter(Boolean).map((s,i)=>'<div class="item" onclick="closeCmpDetail();showSong(\''+s.id+'\')"><div class="rk" style="font-size:.9rem">#'+(i+1)+'</div>'+songHTML(s)+'</div>').join('')}</div><div class="cl"><h3>${pb.name} (${pb.ids.length} total)</h3>${sharedIds.map(id=>gs(id)).filter(Boolean).map((s,i)=>'<div class="item" onclick="closeCmpDetail();showSong(\''+s.id+'\')"><div class="rk" style="font-size:.9rem">#'+(i+1)+'</div>'+songHTML(s)+'</div>').join('')}</div></div>`;
  document.getElementById('cmpCover').classList.add('show');
  document.getElementById('cmpCover').scrollTop=0;
}

// ---- NAV ----
let currentTab='agg';
function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('section-'+t).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-tab="'+t+'"]').classList.add('active');
  if(t==='agg')renderAgg();
  if(t==='rank')renderRank();
  if(t==='song'){document.getElementById('songDetail').innerHTML='';document.getElementById('songResults').innerHTML='<p style="color:var(--text-dim);padding:12px">Type a song name to search.</p>';}
  if(t==='cmp'){closeCmpDetail();renderCmp();}
}
function renderAll(){rSel();if(currentTab==='agg')renderAgg();else if(currentTab==='rank')renderRank();else if(currentTab==='cmp')renderCmp();else if(currentTab==='song'){document.getElementById('songDetail').innerHTML='';document.getElementById('songResults').innerHTML='<p style="color:var(--text-dim);padding:12px">Type a song name to search.</p>';}}

document.querySelectorAll('nav button').forEach(b=>{b.addEventListener('click',()=>switchTab(b.dataset.tab));});
document.getElementById('selProfile').addEventListener('change',()=>{current=document.getElementById('selProfile').value;renderRank();});
document.getElementById('sortRank').addEventListener('change',renderRank);
document.getElementById('sortAgg').addEventListener('change',renderAgg);
document.getElementById('filterRank').addEventListener('change',renderRank);
document.getElementById('filterAgg').addEventListener('change',renderAgg);
document.getElementById('filterRankArtist').addEventListener('change',renderRank);
document.getElementById('filterAggArtist').addEventListener('change',renderAgg);
document.getElementById('hideUnranked').addEventListener('change',renderAgg);
document.getElementById('hideUnrankedRank').addEventListener('change',renderRank);
document.getElementById('filterRankFile')?.addEventListener('change',()=>{rSel();renderRank();});
document.getElementById('filterAggFile')?.addEventListener('change',renderAgg);
document.getElementById('songSearch').addEventListener('input',renderSearch);

loadData();
</script>
